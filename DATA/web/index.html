<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NLP Chatbot</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, "Segoe UI", sans-serif;
      background: #eef3fb;
      color: #172033;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #eef3fb, #f9fbff 55%, #e7f6f1);
    }
    .shell {
      display: grid;
      grid-template-columns: 260px minmax(0, 1fr);
      gap: 18px;
      max-width: 1120px;
      min-height: 100vh;
      margin: auto;
      padding: 22px;
    }
    .panel {
      border: 1px solid #dae3f1;
      border-radius: 18px;
      background: rgba(255, 255, 255, .94);
      box-shadow: 0 18px 48px rgba(35, 60, 100, .11);
    }
    aside { padding: 20px; }
    h1, h2, p { margin-top: 0; }
    h1 { margin-bottom: 6px; font-size: 21px; }
    h2 { margin: 18px 0 10px; font-size: 14px; color: #47566d; }
    .subtle, #status { color: #6a7890; font-size: 13px; line-height: 1.45; }
    label { display: block; margin-bottom: 6px; color: #47566d; font-size: 13px; }
    input, button {
      border: 1px solid #cad6e7;
      border-radius: 10px;
      background: #fff;
      color: #172033;
      font: inherit;
    }
    input { width: 100%; padding: 11px 12px; outline: none; }
    input:focus { border-color: #4978d3; box-shadow: 0 0 0 3px #dbe7ff; }
    button { padding: 10px 12px; cursor: pointer; }
    button:hover { border-color: #6b91d5; background: #f4f7fd; }
    .commands { display: grid; gap: 7px; }
    .commands button { width: 100%; text-align: left; font-size: 13px; }
    .chat {
      display: grid;
      grid-template-rows: auto minmax(320px, 1fr) auto auto;
      min-height: calc(100vh - 44px);
      padding: 20px;
    }
    .messages {
      overflow-y: auto;
      padding: 14px 2px;
      border-block: 1px solid #e7edf6;
    }
    .message { max-width: 82%; margin: 10px 0; padding: 11px 13px; border-radius: 14px; white-space: pre-wrap; line-height: 1.45; }
    .message.user { margin-left: auto; background: #e9f0ff; color: #194b9d; }
    .message.bot { background: #e8f7f0; color: #176245; }
    .message.meta { max-width: 100%; background: transparent; color: #7b8799; font-size: 13px; text-align: center; }
    .message img { display: block; max-width: 100%; max-height: 420px; margin-top: 10px; border-radius: 10px; }
    .input-row { display: grid; grid-template-columns: 1fr auto; gap: 9px; padding-top: 14px; }
    .primary { border-color: #3972d4; background: #3972d4; color: white; font-weight: 600; }
    .primary:hover { background: #2e63bc; color: white; }
    .actions { display: flex; flex-wrap: wrap; gap: 8px; padding-top: 10px; }
    #filePicker { display: none; }
    @media (max-width: 760px) {
      .shell { display: block; padding: 10px; }
      aside { display: none; }
      .chat { min-height: calc(100vh - 20px); border-radius: 13px; }
      .message { max-width: 92%; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <aside class="panel">
      <h1>User Profile</h1>
      <p class="subtle">Your local chatbot command center.</p>
      <label for="userName">Display name</label>
      <input id="userName" value="User" autocomplete="name">
      <h2>Commands</h2>
      <div class="commands">
        <button data-command="/help">/help</button>
        <button data-command="/time">/time</button>
        <button data-command="/date">/date</button>
        <button data-prefill="/search ">/search &lt;query&gt;</button>
        <button data-prefill="/image ">/image &lt;prompt&gt;</button>
        <button data-upload>/analyze image</button>
        <button data-clear>/clear</button>
      </div>
      <h2>Status</h2>
      <p id="status">Ready.</p>
    </aside>
    <section class="chat panel">
      <header>
        <h1>Ask the Chatbot</h1>
        <p class="subtle">Ask a question, run a command, or upload an image for prediction.</p>
      </header>
      <div class="messages" id="messages" aria-live="polite"></div>
      <form class="input-row" id="chatForm">
        <input id="messageInput" placeholder="Type a message..." autofocus autocomplete="off">
        <button class="primary" type="submit">Send</button>
      </form>
      <div class="actions">
        <button id="generateButton">Generate Image</button>
        <button id="uploadButton">Upload &amp; Predict</button>
        <button id="clearButton">Clear Chat</button>
        <input id="filePicker" type="file" accept=".png,.jpg,.jpeg,.webp,.heic,.heif">
      </div>
    </section>
  </main>
  <script>
    const messages = document.querySelector("#messages");
    const input = document.querySelector("#messageInput");
    const status = document.querySelector("#status");
    const filePicker = document.querySelector("#filePicker");

    function addMessage(text, kind = "bot", imageUrl = "") {
      const block = document.createElement("div");
      block.className = `message ${kind}`;
      block.textContent = text;
      if (imageUrl) {
        const image = document.createElement("img");
        image.src = imageUrl;
        image.alt = "AI generated image";
        block.append(image);
      }
      messages.append(block);
      messages.scrollTop = messages.scrollHeight;
    }

    async function postJson(path, body) {
      const response = await fetch(path, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      const payload = await response.json();
      if (!response.ok) throw new Error(payload.error || "Request failed.");
      return payload;
    }

    async function sendMessage(text = input.value) {
      text = text.trim();
      if (!text) return;
      input.value = "";
      if (text === "/clear") {
        messages.textContent = "";
        addMessage("Conversation cleared.", "meta");
        return;
      }
      addMessage(text, "user");
      status.textContent = "Thinking...";
      try {
        const reply = await postJson("/api/chat", {
          message: text,
          user_name: document.querySelector("#userName").value,
        });
        addMessage(reply.text, "bot", reply.image_url || "");
        if (reply.action === "open_url" && reply.url) window.open(reply.url, "_blank", "noopener");
      } catch (error) {
        addMessage(error.message, "bot");
      } finally {
        status.textContent = "Ready.";
        input.focus();
      }
    }

    async function analyzeFile(file) {
      if (!file) return;
      const question = input.value.trim().replace(/^\/analyze\s*/i, "");
      input.value = "";
      addMessage(`Analyzing ${file.name}...`, "meta");
      status.textContent = "Predicting uploaded image...";
      try {
        const content = await file.arrayBuffer();
        let binary = "";
        for (const byte of new Uint8Array(content)) binary += String.fromCharCode(byte);
        const reply = await postJson("/api/analyze", {
          file_name: file.name,
          question,
          content_base64: btoa(binary),
        });
        addMessage(reply.text);
      } catch (error) {
        addMessage(error.message);
      } finally {
        status.textContent = "Ready.";
        filePicker.value = "";
      }
    }

    document.querySelector("#chatForm").addEventListener("submit", event => {
      event.preventDefault();
      sendMessage();
    });
    document.querySelector("#generateButton").addEventListener("click", () => {
      const prompt = input.value.trim();
      sendMessage(prompt.startsWith("/image ") ? prompt : `/image ${prompt}`);
    });
    document.querySelector("#uploadButton").addEventListener("click", () => filePicker.click());
    document.querySelector("#clearButton").addEventListener("click", () => sendMessage("/clear"));
    filePicker.addEventListener("change", () => analyzeFile(filePicker.files[0]));
    document.querySelectorAll("[data-command]").forEach(button => {
      button.addEventListener("click", () => sendMessage(button.dataset.command));
    });
    document.querySelectorAll("[data-prefill]").forEach(button => {
      button.addEventListener("click", () => {
        input.value = button.dataset.prefill;
        input.focus();
      });
    });
    document.querySelector("[data-upload]").addEventListener("click", () => filePicker.click());
    document.querySelector("[data-clear]").addEventListener("click", () => sendMessage("/clear"));
    addMessage("Hello! I am ready to help. Type /help to see everything I can do.");
  </script>
</body>
</html>
