<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NLP Chatbot — Sentiment Aware</title>
<style>
/* ============================================================
   RESET & ROOT
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          #f0f2f7;
  --surface:     #ffffff;
  --border:      #e2e8f0;
  --text:        #1e293b;
  --muted:       #64748b;
  --primary:     #3b82f6;
  --primary-dk:  #1e40af;

  /* sentiment colours */
  --pos-bg:      #dcfce7;  --pos-fg:  #166534;  --pos-bar: #22c55e;
  --neg-bg:      #fee2e2;  --neg-fg:  #991b1b;  --neg-bar: #ef4444;
  --neu-bg:      #f1f5f9;  --neu-fg:  #475569;  --neu-bar: #94a3b8;

  --radius:      14px;
  --shadow:      0 8px 32px rgba(0,0,0,.10);
  font-family:   'Segoe UI', system-ui, sans-serif;
}

body {
  background: var(--bg);
  display: flex;
  gap: 16px;
  padding: 16px;
  min-height: 100vh;
  align-items: flex-start;
  justify-content: center;
}

/* ============================================================
   LAYOUT — two-panel (chat + dashboard)
   ============================================================ */
.chat-wrap {
  display: flex;
  gap: 16px;
  width: 100%;
  max-width: 1120px;
  align-items: flex-start;
}

/* ============================================================
   CHAT PANEL
   ============================================================ */
.chat-container {
  flex: 1 1 0;
  min-width: 0;
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  display: flex;
  flex-direction: column;
  height: 92vh;
  max-height: 860px;
  overflow: hidden;
}

/* Header */
.chat-header {
  padding: 16px 22px;
  background: linear-gradient(135deg, var(--primary-dk), var(--primary));
  color: #fff;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}
.header-avatar {
  width: 40px; height: 40px; border-radius: 50%;
  background: rgba(255,255,255,.22);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
}
.header-info h1 { font-size: 16px; font-weight: 700; }
.header-info p  { font-size: 11px; opacity: .85; margin-top: 2px; }
.header-right   { margin-left: auto; display: flex; align-items: center; gap: 10px; }
.status-dot     { width: 9px; height: 9px; border-radius: 50%; background: #4ade80; box-shadow: 0 0 6px #4ade80; }

/* Current sentiment pill in header */
#headerSentiment {
  font-size: 12px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 20px;
  background: rgba(255,255,255,.20);
  display: none;
  gap: 5px;
  align-items: center;
}
#headerSentiment.visible { display: flex; }

/* Messages area */
#messages {
  flex: 1 1 0;
  overflow-y: auto;
  padding: 18px 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  scroll-behavior: smooth;
}

/* Message rows */
.msg-row { display: flex; gap: 8px; align-items: flex-end; }
.msg-row.user { flex-direction: row-reverse; }

.msg-avatar {
  width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 14px;
  background: #dbeafe;
}
.msg-row.user .msg-avatar { background: #bfdbfe; }

.msg-body { display: flex; flex-direction: column; max-width: 70%; gap: 3px; }
.msg-row.user .msg-body { align-items: flex-end; }

.bubble {
  padding: 9px 14px;
  border-radius: 16px;
  font-size: 14px;
  line-height: 1.55;
  white-space: pre-wrap;
  word-break: break-word;
}
.msg-row.bot  .bubble { background: var(--neu-bg); color: var(--text); border-bottom-left-radius: 4px; }
.msg-row.user .bubble { background: var(--primary); color: #fff; border-bottom-right-radius: 4px; }

/* Sentiment badge under bot bubble */
.sentiment-badge {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 11px; font-weight: 600;
  padding: 2px 9px; border-radius: 20px;
  width: fit-content;
}
.sentiment-badge.POSITIVE { background: var(--pos-bg); color: var(--pos-fg); }
.sentiment-badge.NEGATIVE { background: var(--neg-bg); color: var(--neg-fg); }
.sentiment-badge.NEUTRAL  { background: var(--neu-bg); color: var(--neu-fg); }

/* Escalation alert */
.escalation-alert {
  display: flex; align-items: flex-start; gap: 8px;
  background: #fff7ed; border: 1px solid #fed7aa;
  border-radius: 10px; padding: 10px 12px;
  font-size: 13px; color: #92400e;
  max-width: 70%;
}
.escalation-alert .icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }

.timestamp { font-size: 10px; color: var(--muted); }

/* Typing indicator */
.typing-row .bubble { display: flex; gap: 4px; align-items: center; padding: 12px 16px; }
.typing-row .bubble span {
  width: 7px; height: 7px; border-radius: 50%; background: #94a3b8;
  animation: bounce 1.2s infinite;
}
.typing-row .bubble span:nth-child(2) { animation-delay:.2s; }
.typing-row .bubble span:nth-child(3) { animation-delay:.4s; }
@keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }

/* Bubble colour tinting for negative messages */
.msg-row.bot.sentiment-NEGATIVE .bubble { background: #fff1f2; }
.msg-row.bot.sentiment-POSITIVE .bubble { background: #f0fdf4; }

/* Generated image */
.chat-image { max-width: 100%; border-radius: 10px; margin-top: 6px; display: block; }

/* Quick commands */
.quick-bar {
  padding: 8px 18px 4px;
  display: flex; gap: 6px; flex-wrap: wrap;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.quick-bar button {
  font-size: 11px; padding: 4px 11px; border-radius: 20px;
  border: 1px solid var(--border); background: #f8fafc;
  cursor: pointer; color: var(--muted); transition: background .15s;
}
.quick-bar button:hover { background: #e2e8f0; }

/* Name bar */
.name-bar {
  padding: 6px 18px; display: flex; gap: 8px; align-items: center;
  border-top: 1px solid var(--border); background: #fafafa; flex-shrink: 0;
}
.name-bar label { font-size: 11px; color: var(--muted); white-space: nowrap; }
.name-bar input {
  max-width: 180px; border: 1px solid var(--border); border-radius: 8px;
  padding: 4px 10px; font-size: 12px; outline: none;
}
.name-bar button {
  font-size: 11px; padding: 4px 12px; border-radius: 8px;
  border: none; background: var(--primary); color: #fff; cursor: pointer;
}
.name-bar button:hover { background: var(--primary-dk); }

/* Input bar */
.input-bar {
  padding: 12px 18px;
  border-top: 1px solid var(--border);
  display: flex; gap: 10px; align-items: center;
  background: var(--surface); flex-shrink: 0;
}
#userInput {
  flex: 1; border: 1px solid #cbd5e1; border-radius: 24px;
  padding: 9px 18px; font-size: 14px; outline: none; transition: border-color .2s;
}
#userInput:focus { border-color: var(--primary); }
.btn-send {
  width: 42px; height: 42px; border-radius: 50%;
  background: var(--primary); color: #fff; border: none; cursor: pointer;
  font-size: 17px; display: flex; align-items: center; justify-content: center;
  transition: background .2s, transform .1s;
}
.btn-send:hover  { background: var(--primary-dk); }
.btn-send:active { transform: scale(.95); }

/* ============================================================
   DASHBOARD PANEL
   ============================================================ */
.dashboard {
  width: 300px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.dash-card {
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 18px;
}
.dash-card h2 {
  font-size: 13px;
  font-weight: 700;
  color: var(--muted);
  letter-spacing: .04em;
  text-transform: uppercase;
  margin-bottom: 14px;
}

/* Live gauge */
.gauge-label {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 6px;
}
.gauge-label .score { font-size: 20px; font-weight: 800; color: var(--text); }
.gauge-label .emoji { font-size: 26px; }
.gauge-track {
  height: 10px; border-radius: 5px; background: #e2e8f0; overflow: hidden;
  position: relative;
}
.gauge-fill {
  height: 100%; border-radius: 5px;
  transition: width .5s ease, background .5s ease;
  width: 50%;
  background: var(--neu-bar);
}
.gauge-labels {
  display: flex; justify-content: space-between;
  font-size: 10px; color: var(--muted); margin-top: 4px;
}
.gauge-detail {
  margin-top: 10px; font-size: 12px; color: var(--muted); text-align: center;
}

/* Tally counters */
.tally-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
}
.tally-item {
  border-radius: 10px; padding: 10px 6px; text-align: center;
}
.tally-item.POSITIVE { background: var(--pos-bg); }
.tally-item.NEGATIVE { background: var(--neg-bg); }
.tally-item.NEUTRAL  { background: var(--neu-bg); }
.tally-item .t-emoji { font-size: 20px; }
.tally-item .t-count { font-size: 22px; font-weight: 800; }
.tally-item.POSITIVE .t-count { color: var(--pos-fg); }
.tally-item.NEGATIVE .t-count { color: var(--neg-fg); }
.tally-item.NEUTRAL  .t-count { color: var(--neu-fg); }
.tally-item .t-label { font-size: 10px; font-weight: 600; letter-spacing:.04em; text-transform: uppercase; }
.tally-item.POSITIVE .t-label { color: var(--pos-fg); }
.tally-item.NEGATIVE .t-label { color: var(--neg-fg); }
.tally-item.NEUTRAL  .t-label { color: var(--neu-fg); }

/* History list */
.history-list {
  display: flex; flex-direction: column; gap: 6px;
  max-height: 280px; overflow-y: auto;
}
.history-item {
  display: flex; gap: 8px; align-items: flex-start;
  padding: 7px 10px; border-radius: 8px; font-size: 12px;
  border: 1px solid transparent;
}
.history-item.POSITIVE { background: var(--pos-bg); border-color: #bbf7d0; }
.history-item.NEGATIVE { background: var(--neg-bg); border-color: #fecaca; }
.history-item.NEUTRAL  { background: var(--neu-bg); border-color: var(--border); }
.h-emoji { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
.h-body  { flex: 1; min-width: 0; }
.h-msg   { color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.h-meta  { font-size: 10px; color: var(--muted); margin-top: 2px; }

.empty-note {
  text-align: center; color: var(--muted); font-size: 12px; padding: 20px 0;
}

/* Responsive: stack on small screens */
@media (max-width: 800px) {
  .chat-wrap    { flex-direction: column; }
  .dashboard    { width: 100%; }
  .chat-container { height: 70vh; }
}
</style>
</head>
<body>

<div class="chat-wrap">

  <!-- ==================== CHAT PANEL ==================== -->
  <div class="chat-container">

    <div class="chat-header">
      <div class="header-avatar">🤖</div>
      <div class="header-info">
        <h1>NLP Chatbot</h1>
        <p>Sentiment-Aware · TensorFlow + VADER</p>
      </div>
      <div class="header-right">
        <div id="headerSentiment">
          <span id="hSentEmoji">😐</span>
          <span id="hSentLabel">NEUTRAL</span>
        </div>
        <div class="status-dot" title="Online"></div>
      </div>
    </div>

    <div id="messages"></div>

    <!-- Quick commands -->
    <div class="quick-bar">
      <button onclick="send('/help')">📋 Help</button>
      <button onclick="send('/time')">🕐 Time</button>
      <button onclick="send('/date')">📅 Date</button>
      <button onclick="send('/mood')">🎭 My Mood</button>
      <button onclick="prefill('/ask ')">💬 Ask</button>
      <button onclick="prefill('/image ')">🎨 Image</button>
      <button onclick="send('/analyze')">🖼 Analyze</button>
    </div>

    <!-- Name bar -->
    <div class="name-bar">
      <label>Your name:</label>
      <input id="nameInput" type="text" value="User" maxlength="40" placeholder="Your name"/>
      <button onclick="applyName()">Apply</button>
    </div>

    <!-- Input -->
    <div class="input-bar">
      <input id="userInput" type="text" placeholder="Type a message or /command…" autocomplete="off"/>
      <button class="btn-send" onclick="send()" title="Send">➤</button>
    </div>

  </div><!-- /.chat-container -->

  <!-- ==================== DASHBOARD PANEL ==================== -->
  <div class="dashboard">

    <!-- Live gauge -->
    <div class="dash-card">
      <h2>🎭 Live Sentiment</h2>
      <div class="gauge-label">
        <span class="score" id="gaugeScore">—</span>
        <span class="emoji" id="gaugeEmoji">😐</span>
      </div>
      <div class="gauge-track">
        <div class="gauge-fill" id="gaugeFill"></div>
      </div>
      <div class="gauge-labels"><span>Very Negative</span><span>Neutral</span><span>Very Positive</span></div>
      <div class="gauge-detail" id="gaugeDetail">Send a message to see live analysis</div>
    </div>

    <!-- Tally -->
    <div class="dash-card">
      <h2>📊 Session Totals</h2>
      <div class="tally-grid">
        <div class="tally-item POSITIVE">
          <div class="t-emoji">😊</div>
          <div class="t-count" id="countPos">0</div>
          <div class="t-label">Positive</div>
        </div>
        <div class="tally-item NEUTRAL">
          <div class="t-emoji">😐</div>
          <div class="t-count" id="countNeu">0</div>
          <div class="t-label">Neutral</div>
        </div>
        <div class="tally-item NEGATIVE">
          <div class="t-emoji">😟</div>
          <div class="t-count" id="countNeg">0</div>
          <div class="t-label">Negative</div>
        </div>
      </div>
    </div>

    <!-- Sentiment history -->
    <div class="dash-card" style="flex:1">
      <h2>📋 Message History</h2>
      <div class="history-list" id="historyList">
        <div class="empty-note">No messages yet</div>
      </div>
    </div>

  </div><!-- /.dashboard -->

</div><!-- /.chat-wrap -->

<!-- Hidden file input for image analysis -->
<input type="file" id="fileInput" accept=".png,.jpg,.jpeg,.webp,.heic,.heif" style="display:none"/>

<script>
/* ============================================================
   STATE
   ============================================================ */
const state = {
  counts: { POSITIVE: 0, NEUTRAL: 0, NEGATIVE: 0 },
  history: [],     // { ts, msg, sentiment }
  lastSentiment: null,
};

/* ============================================================
   DOM REFS
   ============================================================ */
const messagesEl  = document.getElementById('messages');
const inputEl     = document.getElementById('userInput');
const nameEl      = document.getElementById('nameInput');
const historyEl   = document.getElementById('historyList');
const countPos    = document.getElementById('countPos');
const countNeu    = document.getElementById('countNeu');
const countNeg    = document.getElementById('countNeg');
const gaugeFill   = document.getElementById('gaugeFill');
const gaugeScore  = document.getElementById('gaugeScore');
const gaugeEmoji  = document.getElementById('gaugeEmoji');
const gaugeDetail = document.getElementById('gaugeDetail');
const hSentEmoji  = document.getElementById('hSentEmoji');
const hSentLabel  = document.getElementById('hSentLabel');
const headerSent  = document.getElementById('headerSentiment');

inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });

/* ============================================================
   HELPERS
   ============================================================ */
function getUserName() { return nameEl.value.trim() || 'User'; }
function prefill(t) { inputEl.value = t; inputEl.focus(); }
function applyName() { addMeta(`Profile updated: ${getUserName()}`); }
function now() { return new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' }); }
function nowISO() { return new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit', second:'2-digit' }); }

/* ============================================================
   SENTIMENT COLOURS
   ============================================================ */
const SENTIMENT_COLOURS = {
  POSITIVE: { bg: 'var(--pos-bg)', fg: 'var(--pos-fg)', bar: 'var(--pos-bar)' },
  NEGATIVE: { bg: 'var(--neg-bg)', fg: 'var(--neg-fg)', bar: 'var(--neg-bar)' },
  NEUTRAL:  { bg: 'var(--neu-bg)', fg: 'var(--neu-fg)', bar: 'var(--neu-bar)' },
};

/* ============================================================
   DASHBOARD UPDATES
   ============================================================ */
function updateDashboard(userMsg, sentiment) {
  if (!sentiment) return;

  const { label, intensity, compound, emoji, escalate } = sentiment;

  // ---- tally
  state.counts[label] = (state.counts[label] || 0) + 1;
  countPos.textContent = state.counts.POSITIVE;
  countNeu.textContent = state.counts.NEUTRAL;
  countNeg.textContent = state.counts.NEGATIVE;

  // ---- gauge  (compound: −1…+1  →  0%…100%)
  const pct = Math.round((compound + 1) / 2 * 100);
  gaugeFill.style.width      = pct + '%';
  gaugeFill.style.background = SENTIMENT_COLOURS[label].bar;
  gaugeScore.textContent     = (compound >= 0 ? '+' : '') + compound.toFixed(3);
  gaugeEmoji.textContent     = emoji;
  gaugeDetail.textContent    = `${label} · ${intensity} intensity · Score: ${compound >= 0 ? '+' : ''}${compound.toFixed(3)}`;

  // ---- header pill
  hSentEmoji.textContent = emoji;
  hSentLabel.textContent = label;
  headerSent.className   = 'visible';
  headerSent.style.background =
    label === 'POSITIVE' ? 'rgba(74,222,128,.25)' :
    label === 'NEGATIVE' ? 'rgba(248,113,113,.25)' : 'rgba(255,255,255,.20)';

  // ---- history
  state.history.push({ ts: nowISO(), msg: userMsg, sentiment });
  renderHistory();
}

function renderHistory() {
  if (state.history.length === 0) {
    historyEl.innerHTML = '<div class="empty-note">No messages yet</div>';
    return;
  }
  historyEl.innerHTML = '';
  [...state.history].reverse().forEach(({ ts, msg, sentiment }) => {
    const { label, emoji, compound } = sentiment;
    const item = document.createElement('div');
    item.className = `history-item ${label}`;
    item.innerHTML = `
      <span class="h-emoji">${emoji}</span>
      <div class="h-body">
        <div class="h-msg" title="${escHtml(msg)}">${escHtml(msg)}</div>
        <div class="h-meta">${ts} · ${label} · ${compound >= 0 ? '+' : ''}${compound.toFixed(3)}</div>
      </div>`;
    historyEl.appendChild(item);
  });
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ============================================================
   CHAT RENDERING
   ============================================================ */
function addMessage(text, role, sentiment, imageUrl) {
  const row = document.createElement('div');
  row.className = `msg-row ${role}`;
  if (sentiment && role === 'bot') row.classList.add(`sentiment-${sentiment.label}`);

  const avatarEl = document.createElement('div');
  avatarEl.className = 'msg-avatar';
  avatarEl.textContent = role === 'bot' ? '🤖' : '🧑';

  const body = document.createElement('div');
  body.className = 'msg-body';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;

  if (imageUrl) {
    const img = document.createElement('img');
    img.src = imageUrl; img.className = 'chat-image';
    bubble.appendChild(img);
  }

  body.appendChild(bubble);

  // sentiment badge under bot bubble
  if (sentiment && role === 'bot') {
    const badge = document.createElement('div');
    badge.className = `sentiment-badge ${sentiment.label}`;
    badge.innerHTML = `${sentiment.emoji} ${sentiment.label} <span style="opacity:.65;font-weight:400;">${sentiment.intensity}</span>`;
    body.appendChild(badge);
  }

  const ts = document.createElement('div');
  ts.className = 'timestamp';
  ts.textContent = now();
  body.appendChild(ts);

  if (role === 'bot') { row.appendChild(avatarEl); row.appendChild(body); }
  else               { row.appendChild(body);      row.appendChild(avatarEl); }

  messagesEl.appendChild(row);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return row;
}

function addMeta(text) {
  const el = document.createElement('div');
  el.style.cssText = 'font-size:11px;color:var(--muted);text-align:center;padding:1px 0;';
  el.textContent = `${now()}  ${text}`;
  messagesEl.appendChild(el);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function addEscalationAlert() {
  const row = document.createElement('div');
  row.className = 'msg-row bot';
  row.innerHTML = `
    <div class="msg-avatar">🤖</div>
    <div class="escalation-alert">
      <span class="icon">⚠️</span>
      <span>It looks like you're experiencing significant difficulty.
      Would you like to be connected to a human agent?
      Just type <strong>escalate</strong> or <strong>speak to someone</strong>.</span>
    </div>`;
  messagesEl.appendChild(row);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function addTyping() {
  const row = document.createElement('div');
  row.id = 'typing'; row.className = 'msg-row bot typing-row';
  row.innerHTML = `<div class="msg-avatar">🤖</div>
    <div class="bubble"><span></span><span></span><span></span></div>`;
  messagesEl.appendChild(row);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}
function removeTyping() { document.getElementById('typing')?.remove(); }

/* ============================================================
   SEND
   ============================================================ */
async function send(preset) {
  const text = (preset !== undefined ? preset : inputEl.value).trim();
  if (!text) return;
  inputEl.value = '';

  if (text.toLowerCase() === '/analyze' || text.toLowerCase().startsWith('/analyze ')) {
    addMessage(text, 'user');
    addMeta('Choose an image from your device…');
    document.getElementById('fileInput').click();
    return;
  }

  addMessage(text, 'user');
  addTyping();

  try {
    const res  = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, user_name: getUserName() }),
    });
    const data = await res.json();
    removeTyping();

    if (data.error) { addMessage(`⚠️ ${data.error}`, 'bot'); return; }

    const sentiment = data.sentiment || null;
    updateDashboard(text, sentiment);

    if (data.action === 'open_url' && data.url) {
      addMessage(data.text, 'bot', sentiment);
      window.open(data.url, '_blank');
      return;
    }
    if (data.action === 'show_image' && data.image_url) {
      addMessage(data.text, 'bot', sentiment, data.image_url);
      return;
    }

    addMessage(data.text || '…', 'bot', sentiment);

    // Show escalation UI card for strongly negative messages
    if (sentiment && sentiment.escalate) {
      setTimeout(addEscalationAlert, 400);
    }

  } catch (err) {
    removeTyping();
    addMessage('⚠️ Could not reach the server. Is it running?', 'bot');
  }
}

/* ============================================================
   IMAGE ANALYSIS
   ============================================================ */
document.getElementById('fileInput').addEventListener('change', async function () {
  const file = this.files[0];
  this.value = '';
  if (!file) { addMeta('Selection cancelled.'); return; }
  addMeta(`Selected: ${file.name}`);
  addTyping();
  const reader = new FileReader();
  reader.onload = async () => {
    const b64 = reader.result.split(',')[1];
    try {
      const res  = await fetch('/api/analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ file_name: file.name, content_base64: b64, question: '' }),
      });
      const data = await res.json();
      removeTyping();
      addMessage(data.error ? `⚠️ ${data.error}` : data.text, 'bot');
    } catch { removeTyping(); addMessage('⚠️ Analysis failed.', 'bot'); }
  };
  reader.readAsDataURL(file);
});
