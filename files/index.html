<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NLP Chatbot</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #f0f2f5;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 16px;
  }

  .chat-container {
    width: 100%;
    max-width: 720px;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    display: flex;
    flex-direction: column;
    height: 90vh;
    max-height: 820px;
    overflow: hidden;
  }

  /* Header */
  .chat-header {
    padding: 18px 24px;
    background: linear-gradient(135deg, #1e40af, #3b82f6);
    color: #fff;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .chat-header .avatar {
    width: 42px; height: 42px;
    background: rgba(255,255,255,0.25);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  .chat-header h1 { font-size: 18px; font-weight: 700; }
  .chat-header p  { font-size: 12px; opacity: 0.85; margin-top: 2px; }
  .status-dot {
    width: 8px; height: 8px;
    background: #4ade80;
    border-radius: 50%;
    margin-left: auto;
    box-shadow: 0 0 6px #4ade80;
  }

  /* Messages */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
  }

  .msg-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  .msg-row.user { flex-direction: row-reverse; }

  .bubble {
    max-width: 72%;
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.55;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .msg-row.bot  .bubble { background: #f1f5f9; color: #1e293b; border-bottom-left-radius: 4px; }
  .msg-row.user .bubble { background: #3b82f6; color: #fff; border-bottom-right-radius: 4px; }

  .msg-avatar {
    width: 30px; height: 30px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0;
  }
  .bot  .msg-avatar { background: #dbeafe; }
  .user .msg-avatar { background: #bfdbfe; }

  .timestamp {
    font-size: 10px;
    color: #94a3b8;
    margin-top: 3px;
    text-align: right;
  }
  .msg-row.bot .timestamp { text-align: left; }

  /* Typing indicator */
  .typing .bubble {
    display: flex; gap: 4px; align-items: center;
    padding: 12px 16px;
  }
  .typing .bubble span {
    width: 7px; height: 7px; border-radius: 50%; background: #94a3b8;
    animation: bounce 1.2s infinite;
  }
  .typing .bubble span:nth-child(2) { animation-delay: .2s; }
  .typing .bubble span:nth-child(3) { animation-delay: .4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); }
    40%           { transform: translateY(-6px); }
  }

  /* Generated image */
  .chat-image { max-width: 100%; border-radius: 10px; margin-top: 8px; }

  /* Input bar */
  .input-bar {
    padding: 14px 20px;
    border-top: 1px solid #e2e8f0;
    display: flex;
    gap: 10px;
    align-items: center;
    background: #fff;
  }
  #userInput {
    flex: 1;
    border: 1px solid #cbd5e1;
    border-radius: 24px;
    padding: 10px 18px;
    font-size: 14px;
    outline: none;
    transition: border-color .2s;
  }
  #userInput:focus { border-color: #3b82f6; }

  .btn-send {
    width: 44px; height: 44px; border-radius: 50%;
    background: #3b82f6; color: #fff; border: none; cursor: pointer;
    font-size: 18px; display: flex; align-items: center; justify-content: center;
    transition: background .2s, transform .1s;
  }
  .btn-send:hover  { background: #2563eb; }
  .btn-send:active { transform: scale(.95); }

  /* Quick commands bar */
  .quick-cmds {
    padding: 8px 20px 4px;
    display: flex; gap: 8px; flex-wrap: wrap;
    border-top: 1px solid #f1f5f9;
  }
  .quick-cmds button {
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid #cbd5e1;
    background: #f8fafc;
    cursor: pointer;
    color: #475569;
    transition: background .15s;
  }
  .quick-cmds button:hover { background: #e2e8f0; }

  /* Name bar */
  .name-bar {
    padding: 8px 20px;
    display: flex; gap: 8px; align-items: center;
    border-top: 1px solid #f1f5f9;
    background: #fafafa;
  }
  .name-bar label { font-size: 12px; color: #64748b; }
  .name-bar input {
    flex: 1; border: 1px solid #cbd5e1; border-radius: 8px;
    padding: 5px 10px; font-size: 13px; outline: none;
    max-width: 200px;
  }
  .name-bar button {
    font-size: 12px; padding: 5px 14px;
    border-radius: 8px; border: none;
    background: #3b82f6; color: #fff; cursor: pointer;
  }
  .name-bar button:hover { background: #2563eb; }
</style>
</head>
<body>
<div class="chat-container">

  <!-- Header -->
  <div class="chat-header">
    <div class="avatar">🤖</div>
    <div>
      <h1>NLP Chatbot</h1>
      <p>Powered by TensorFlow &amp; local Ollama</p>
    </div>
    <div class="status-dot" title="Online"></div>
  </div>

  <!-- Messages -->
  <div id="messages"></div>

  <!-- Quick commands -->
  <div class="quick-cmds">
    <button onclick="send('/help')">📋 Help</button>
    <button onclick="send('/time')">🕐 Time</button>
    <button onclick="send('/date')">📅 Date</button>
    <button onclick="prefill('/search ')">🔍 Search</button>
    <button onclick="prefill('/image ')">🎨 Image</button>
    <button onclick="send('/analyze')">🖼 Analyze</button>
  </div>

  <!-- Name bar -->
  <div class="name-bar">
    <label>Your name:</label>
    <input id="nameInput" type="text" value="User" placeholder="Your name" maxlength="40"/>
    <button onclick="applyName()">Apply</button>
  </div>

  <!-- Input -->
  <div class="input-bar">
    <input id="userInput" type="text" placeholder="Type a message or /command…" autocomplete="off"/>
    <button class="btn-send" onclick="send()" title="Send">➤</button>
  </div>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('userInput');
  const nameEl     = document.getElementById('nameInput');
  let pendingAnalyze = false;

  inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });

  function getUserName() { return nameEl.value.trim() || 'User'; }

  function applyName() {
    const name = getUserName();
    addMeta(`Profile updated: ${name}`);
  }

  function prefill(text) {
    inputEl.value = text;
    inputEl.focus();
  }

  function now() {
    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function addMessage(text, role, imageUrl) {
    const row = document.createElement('div');
    row.className = `msg-row ${role}`;

    const avatarEl = document.createElement('div');
    avatarEl.className = 'msg-avatar';
    avatarEl.textContent = role === 'bot' ? '🤖' : '🧑';

    const wrap = document.createElement('div');

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;

    if (imageUrl) {
      const img = document.createElement('img');
      img.src = imageUrl;
      img.className = 'chat-image';
      bubble.appendChild(img);
    }

    const ts = document.createElement('div');
    ts.className = 'timestamp';
    ts.textContent = now();

    wrap.appendChild(bubble);
    wrap.appendChild(ts);

    if (role === 'bot') {
      row.appendChild(avatarEl);
      row.appendChild(wrap);
    } else {
      row.appendChild(wrap);
      row.appendChild(avatarEl);
    }

    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return row;
  }

  function addMeta(text) {
    const el = document.createElement('div');
    el.style.cssText = 'font-size:11px;color:#94a3b8;text-align:center;padding:2px 0;';
    el.textContent = `${now()}  ${text}`;
    messagesEl.appendChild(el);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function addTyping() {
    const row = document.createElement('div');
    row.className = 'msg-row bot typing';
    row.id = 'typing';
    row.innerHTML = `
      <div class="msg-avatar">🤖</div>
      <div class="bubble"><span></span><span></span><span></span></div>`;
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById('typing');
    if (el) el.remove();
  }

  async function send(preset) {
    const text = (preset !== undefined ? preset : inputEl.value).trim();
    if (!text) return;
    inputEl.value = '';

    // /analyze triggers file picker
    if (text.toLowerCase() === '/analyze' || text.toLowerCase().startsWith('/analyze ')) {
      addMessage(text, 'user');
      addMeta('Choose an image from your device…');
      pendingAnalyze = true;
      document.getElementById('fileInput').click();
      return;
    }

    addMessage(text, 'user');
    addTyping();

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, user_name: getUserName() })
      });
      const data = await res.json();
      removeTyping();

      if (data.error) {
        addMessage(`⚠️ ${data.error}`, 'bot');
        return;
      }

      if (data.action === 'open_url' && data.url) {
        addMessage(data.text, 'bot');
        window.open(data.url, '_blank');
        return;
      }

      if (data.action === 'show_image' && data.image_url) {
        addMessage(data.text, 'bot', data.image_url);
        return;
      }

      addMessage(data.text || '…', 'bot');
    } catch (err) {
      removeTyping();
      addMessage('⚠️ Could not reach the server. Is it running?', 'bot');
    }
  }

  // --- Image analysis via file picker ---
  const fileInput = document.createElement('input');
  fileInput.type = 'file';
  fileInput.id = 'fileInput';
  fileInput.accept = '.png,.jpg,.jpeg,.webp,.heic,.heif';
  fileInput.style.display = 'none';
  document.body.appendChild(fileInput);

  fileInput.addEventListener('change', async () => {
    const file = fileInput.files[0];
    fileInput.value = '';
    if (!file) { addMeta('Image selection cancelled.'); return; }

    addMeta(`Selected: ${file.name}`);
    addTyping();

    const reader = new FileReader();
    reader.onload = async () => {
      const b64 = reader.result.split(',')[1];
      try {
        const res = await fetch('/api/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ file_name: file.name, content_base64: b64, question: '' })
        });
        const data = await res.json();
        removeTyping();
        addMessage(data.error ? `⚠️ ${data.error}` : data.text, 'bot');
      } catch (err) {
        removeTyping();
        addMessage('⚠️ Analysis request failed.', 'bot');
      }
    };
    reader.readAsDataURL(file);
  });

  // Initial greeting
  window.addEventListener('DOMContentLoaded', () => {
    addMessage('Hello! 👋 I\'m your NLP Chatbot. Type a message or pick a quick command above. Use /help to see everything I can do!', 'bot');
  });
</script>
</body>
</html>
